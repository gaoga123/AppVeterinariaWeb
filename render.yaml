services:
  - type: web
    plan: free
    name: veterinariaweb
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn veterinariaweb.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.11.9